<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Foro Ambiental - V1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌿 Foro Ambiental</h1>
        <p>Comparte ideas y soluciones para cuidar el planeta</p>
        <!-- En el header, agregar: -->
        <div class="header-stats">
            <span id="total-comentarios">💬 0</span>
            <span id="total-likes">❤️ 0</span> <!-- NUEVO -->
        </div>
    </header>

    <main>
        <!-- Sección de problemas ambientales -->
        <section id="problemas-container"></section>

        <!-- SECCIÓN DEL FORO -->
        <section id="foro-container">
            <h2>💬 Foro de Discusión</h2>
            
            <div class="formulario-publicacion">
                <h3>Comparte tu idea</h3>
                <form id="form-publicacion">
                    <input type="text" id="autor-publicacion" placeholder="Tu nombre" required>
                    <textarea id="contenido-publicacion" rows="3" placeholder="¿Qué quieres compartir?" required></textarea>
                    <!-- Dentro del formulario, agregar: -->
                    <div class="campo-imagen">
                        <label for="imagen-publicacion">📸 Subir una imagen (opcional):</label>
                        <input type="file" id="imagen-publicacion" accept="image/*">
                    </div>
                    <button type="submit">🌱 Publicar</button>
                </form>
            </div>

            <div id="publicaciones-container"></div>
        </section>
    </main>

    <footer>
        <p>🌍 Proyecto colaborativo - UMM Programación Web</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
